<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Protocol O-Core — IAP Binary Gate</title>
<style>
:root{
  --bg:#0e0e0f;--surface:#16161a;--surface2:#1e1e24;--border:#2a2a33;
  --text:#d4d3d1;--muted:#6b6a68;--faint:#3a3a40;
  --true:#2e7d54;--true-hi:#3dab72;--true-glow:rgba(61,171,114,.18);
  --false:#7d2e2e;--false-hi:#c05050;--false-glow:rgba(192,80,80,.18);
  --warn:#8a6a1a;--warn-hi:#d4a22a;
  --bit-on:#4f98a3;--bit-off:#2a2a33;
  --font-mono:'JetBrains Mono','Fira Code','Courier New',monospace;
  --font-ui:'Inter','Segoe UI',sans-serif;
  --r:6px;--tr:160ms cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:15px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 16px 64px}
h1{font-family:var(--font-mono);font-size:13px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.subtitle{font-size:11px;color:var(--faint);letter-spacing:.08em;margin-bottom:40px;font-family:var(--font-mono)}

/* GATE PANEL */
.gate-panel{width:100%;max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;margin-bottom:20px}
.gate-title{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:20px}

/* BIT CONTROLS */
.bits-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.bit-btn{
  background:var(--bit-off);border:1px solid var(--border);border-radius:var(--r);
  padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:background var(--tr),border-color var(--tr),box-shadow var(--tr);
  font-family:var(--font-mono);
}
.bit-btn[data-v="1"]{background:color-mix(in oklch,var(--bit-on) 20%,var(--surface));border-color:var(--bit-on);box-shadow:0 0 0 1px var(--bit-on) inset}
.bit-btn:active{transform:scale(.97)}
.bit-label{font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.bit-val{font-size:22px;font-weight:700;color:var(--faint);transition:color var(--tr)}
.bit-btn[data-v="1"] .bit-val{color:var(--bit-on)}

/* MODIFIERS */
.mods-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px}
.mod-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  font-family:var(--font-mono);font-size:12px;color:var(--muted);letter-spacing:.06em;
  transition:background var(--tr),border-color var(--tr);
}
.mod-btn[data-v="1"].anom{background:color-mix(in oklch,var(--false-hi) 15%,var(--surface2));border-color:var(--false-hi);color:var(--false-hi)}
.mod-btn[data-v="1"].force{background:color-mix(in oklch,var(--warn-hi) 15%,var(--surface2));border-color:var(--warn-hi);color:var(--warn-hi)}
.mod-indicator{width:8px;height:8px;border-radius:50%;background:var(--faint);transition:background var(--tr)}
.mod-btn[data-v="1"].anom .mod-indicator{background:var(--false-hi)}
.mod-btn[data-v="1"].force .mod-indicator{background:var(--warn-hi)}

/* EQUATION */
.equation{font-family:var(--font-mono);font-size:12px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:var(--r);padding:12px 16px;margin-bottom:24px;letter-spacing:.04em;line-height:1.8}
.eq-part{transition:color var(--tr),opacity var(--tr)}
.eq-part.active{color:var(--bit-on)}
.eq-part.killed{color:var(--false-hi);text-decoration:line-through;opacity:.5}

/* OUTPUT */
.output-box{
  border-radius:var(--r);padding:20px 24px;display:flex;align-items:center;justify-content:space-between;
  transition:background var(--tr),border-color var(--tr),box-shadow var(--tr);
  border:1px solid var(--border);background:var(--surface2);
}
.output-box.out-true{background:var(--true-glow);border-color:var(--true-hi);box-shadow:0 0 24px var(--true-glow)}
.output-box.out-false{background:var(--false-glow);border-color:var(--false-hi);box-shadow:0 0 24px var(--false-glow)}
.out-label{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
.out-value{font-family:var(--font-mono);font-size:32px;font-weight:800;color:var(--faint);transition:color var(--tr),text-shadow var(--tr)}
.output-box.out-true .out-value{color:var(--true-hi);text-shadow:0 0 20px var(--true-glow)}
.output-box.out-false .out-value{color:var(--false-hi);text-shadow:0 0 20px var(--false-glow)}
.out-reason{font-size:11px;color:var(--muted);font-family:var(--font-mono);margin-top:4px}

/* SEQUENCE TABLE */
.seq-panel{width:100%;max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:20px}
.seq-title{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
table{width:100%;border-collapse:collapse}
th{font-family:var(--font-mono);font-size:10px;color:var(--faint);letter-spacing:.08em;text-transform:uppercase;text-align:left;padding:6px 10px;border-bottom:1px solid var(--border)}
td{font-family:var(--font-mono);font-size:12px;padding:8px 10px;border-bottom:1px solid color-mix(in oklch,var(--border) 50%,transparent);transition:color var(--tr),background var(--tr)}
tr.seq-pass td{color:var(--true-hi)}
tr.seq-fail td{color:var(--false-hi)}
tr.seq-warn td{color:var(--warn-hi)}
tr.seq-active td{color:var(--bit-on);background:color-mix(in oklch,var(--bit-on) 6%,transparent)}
tr.seq-init td:first-child{color:var(--muted)}

/* HISTORY */
.history-panel{width:100%;max-width:640px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px}
.history-title{font-family:var(--font-mono);font-size:11px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center}
.clear-btn{font-size:10px;color:var(--faint);cursor:pointer;background:none;border:none;font-family:var(--font-mono);letter-spacing:.06em;text-transform:uppercase;padding:2px 6px;border-radius:3px;transition:color var(--tr)}
.clear-btn:hover{color:var(--muted)}
.history-list{display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto}
.history-item{display:flex;align-items:center;gap:10px;font-family:var(--font-mono);font-size:11px;color:var(--muted);padding:6px 10px;background:var(--surface2);border-radius:4px;border-left:2px solid var(--border);animation:fadeIn .2s ease}
.history-item.h-true{border-left-color:var(--true-hi)}
.history-item.h-false{border-left-color:var(--false-hi)}
.history-item .h-out{font-weight:700;min-width:44px}
.history-item.h-true .h-out{color:var(--true-hi)}
.history-item.h-false .h-out{color:var(--false-hi)}
.history-item .h-bits{color:var(--faint);font-size:10px}
.empty-history{color:var(--faint);font-size:11px;font-family:var(--font-mono);text-align:center;padding:20px}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}

/* RESET */
.reset-btn{
  margin-top:20px;font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);background:none;border:1px solid var(--border);border-radius:var(--r);
  padding:8px 20px;cursor:pointer;transition:color var(--tr),border-color var(--tr);
}
.reset-btn:hover{color:var(--text);border-color:var(--muted)}
</style>
</head>
<body>

<h1>Protocol O-Core</h1>
<div class="subtitle">IAP — Intensity Alignment Process · Binary Gate Only · No Language Logic</div>

<!-- GATE -->
<div class="gate-panel">
  <div class="gate-title">O-Gate Input</div>

  <div class="bits-grid">
    <button class="bit-btn" id="b1" data-v="0" onclick="toggleBit('b1')">
      <span class="bit-label">B1</span>
      <span class="bit-val">0</span>
    </button>
    <button class="bit-btn" id="b2" data-v="0" onclick="toggleBit('b2')">
      <span class="bit-label">B2</span>
      <span class="bit-val">0</span>
    </button>
    <button class="bit-btn" id="b3" data-v="0" onclick="toggleBit('b3')">
      <span class="bit-label">B3</span>
      <span class="bit-val">0</span>
    </button>
    <button class="bit-btn" id="b4" data-v="0" onclick="toggleBit('b4')">
      <span class="bit-label">B4</span>
      <span class="bit-val">0</span>
    </button>
  </div>

  <div class="mods-row">
    <button class="mod-btn anom" id="anom" data-v="0" onclick="toggleMod('anom')">
      <span>ANOMALY</span>
      <span class="mod-indicator"></span>
    </button>
    <button class="mod-btn force" id="force" data-v="0" onclick="toggleMod('force')">
      <span>FORCE·O·FALSE</span>
      <span class="mod-indicator"></span>
    </button>
  </div>

  <div class="equation" id="eq">
    O = (<span class="eq-part" id="eq-b1">B1</span> &amp;
         <span class="eq-part" id="eq-b2">B2</span> &amp;
         <span class="eq-part" id="eq-b3">B3</span> &amp;
         <span class="eq-part" id="eq-b4">B4</span>) &amp;
        ~<span class="eq-part" id="eq-anom">ANOM</span> &amp;
        ~<span class="eq-part" id="eq-force">FORCE</span>
  </div>

  <div class="output-box" id="output-box">
    <div>
      <div class="out-label">Output</div>
      <div class="out-reason" id="out-reason">—</div>
    </div>
    <div class="out-value" id="out-value">0</div>
  </div>
</div>

<!-- SEQUENCE -->
<div class="seq-panel">
  <div class="seq-title">CERT INTEGRITY / PROTOCOL — Sequence</div>
  <table>
    <thead>
      <tr>
        <th>Phase</th>
        <th>Systém</th>
        <th>Objekt O</th>
        <th>Pravidlo R</th>
        <th>Alignment</th>
      </tr>
    </thead>
    <tbody id="seq-body"></tbody>
  </table>
</div>

<!-- HISTORY -->
<div class="history-panel">
  <div class="history-title">
    <span>Execution Log</span>
    <button class="clear-btn" onclick="clearHistory()">CLEAR</button>
  </div>
  <div class="history-list" id="history-list">
    <div class="empty-history">— no executions yet —</div>
  </div>
</div>

<button class="reset-btn" onclick="resetAll()">RESET ALL</button>

<script>
// STATE — pure bits only, no string logic
const S = { b1:0, b2:0, b3:0, b4:0, anom:0, force:0 }
const history = []

// SEQUENCE PHASES
const PHASES = [
  { id:'init',   label:'INICIACE',    sys:'boot',       obj:'—',    rule:'—',      align:'—'       },
  { id:'fp',     label:'FIXED-POINT', sys:'evaluate',   obj:'O(s)', rule:'R∩O',    align:'check'   },
  { id:'close',  label:'UZAVŘENÍ',    sys:'finalize',   obj:'O',    rule:'R',      align:'commit'  },
]

// PURE BINARY GATE — no string, no truthy, no implicit cast
function computeGate(b1, b2, b3, b4, anom, force) {
  // Only 0|1 integers enter. XOR complement via subtraction from 1.
  const lp   = b1 & b2 & b3 & b4   // logical product of input bits
  const am   = anom  === 1 ? 0 : 1  // anomaly kills gate
  const fm   = force === 1 ? 0 : 1  // force-false kills gate
  return lp & am & fm               // result is strictly 0 or 1
}

// REASON — structural map, never string → boolean
const REASON_MAP = {
  // key: [lp, anom, force] → reason string
  '0_0_0': 'input bits not satisfied',
  '0_1_0': 'input bits not satisfied + anomaly active',
  '0_0_1': 'input bits not satisfied + force·false active',
  '0_1_1': 'input bits not satisfied + anomaly + force·false',
  '1_0_0': 'all gates clear → output 1',
  '1_1_0': 'anomaly killed output',
  '1_0_1': 'force·false killed output',
  '1_1_1': 'anomaly + force·false killed output',
}

function getReason(lp, anom, force) {
  return REASON_MAP[`${lp}_${anom}_${force}`] || '—'
}

function toggleBit(id) {
  S[id] = S[id] === 1 ? 0 : 1
  render()
  logExecution()
}

function toggleMod(id) {
  S[id] = S[id] === 1 ? 0 : 1
  render()
  logExecution()
}

function render() {
  const { b1, b2, b3, b4, anom, force } = S
  const lp = b1 & b2 & b3 & b4
  const O  = computeGate(b1, b2, b3, b4, anom, force)

  // Bit buttons
  ;['b1','b2','b3','b4'].forEach(k => {
    const el = document.getElementById(k)
    el.dataset.v = String(S[k])
    el.querySelector('.bit-val').textContent = String(S[k])
  })

  // Mod buttons
  ;['anom','force'].forEach(k => {
    document.getElementById(k).dataset.v = String(S[k])
  })

  // Equation highlights
  ;['b1','b2','b3','b4'].forEach(k => {
    const el = document.getElementById('eq-' + k)
    el.className = 'eq-part' + (S[k] === 1 ? ' active' : '')
  })
  document.getElementById('eq-anom').className  = 'eq-part' + (anom  === 1 ? ' killed' : '')
  document.getElementById('eq-force').className = 'eq-part' + (force === 1 ? ' killed' : '')

  // Output box
  const box   = document.getElementById('output-box')
  const val   = document.getElementById('out-value')
  const rsn   = document.getElementById('out-reason')
  box.className = 'output-box ' + (O === 1 ? 'out-true' : 'out-false')
  val.textContent = String(O)
  rsn.textContent = getReason(lp, anom, force)

  // Sequence table
  renderSequence(O, lp, anom, force)
}

function renderSequence(O, lp, anom, force) {
  const tbody = document.getElementById('seq-body')
  tbody.innerHTML = ''

  PHASES.forEach((p, i) => {
    const tr = document.createElement('tr')
    let cls = 'seq-init'

    if (p.id === 'init') {
      cls = 'seq-active'
    } else if (p.id === 'fp') {
      if      (anom === 1 || force === 1) cls = 'seq-warn'
      else if (lp === 1)                  cls = 'seq-pass'
      else                                cls = 'seq-fail'
    } else if (p.id === 'close') {
      cls = O === 1 ? 'seq-pass' : 'seq-fail'
    }

    tr.className = cls
    tr.innerHTML = `<td>${p.label}</td><td>${p.sys}</td><td>${p.obj}</td><td>${p.rule}</td><td>${p.align}</td>`
    tbody.appendChild(tr)
  })
}

function logExecution() {
  const { b1, b2, b3, b4, anom, force } = S
  const lp = b1 & b2 & b3 & b4
  const O  = computeGate(b1, b2, b3, b4, anom, force)
  const ts = new Date().toTimeString().slice(0,8)

  history.unshift({ O, b1, b2, b3, b4, anom, force, ts, reason: getReason(lp, anom, force) })
  if (history.length > 40) history.pop()

  const list = document.getElementById('history-list')
  list.innerHTML = history.map(h =>
    `<div class="history-item h-${h.O === 1 ? 'true' : 'false'}">
      <span class="h-out">OUT:${h.O}</span>
      <span class="h-bits">B[${h.b1}${h.b2}${h.b3}${h.b4}] A:${h.anom} F:${h.force}</span>
      <span style="margin-left:auto;color:var(--faint);font-size:10px">${h.ts}</span>
    </div>`
  ).join('')
}

function clearHistory() {
  history.length = 0
  document.getElementById('history-list').innerHTML = '<div class="empty-history">— no executions yet —</div>'
}

function resetAll() {
  Object.assign(S, { b1:0, b2:0, b3:0, b4:0, anom:0, force:0 })
  render()
  logExecution()
}

// INIT
render()
</script>
</body>
</html>
