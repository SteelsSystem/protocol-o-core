<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Protocol O-Core</title>
<style>
:root{
  --bg:#08080a;--surface:#15151d;--surface2:#1d1d27;--surface3:#262631;
  --border:#3a3a48;--border2:#4a4a5c;
  --text:#ebeaef;--muted:#a8a7b6;--faint:#787890;
  --true-hi:#5fd692;--true-glow:rgba(95,214,146,.22);--true-dim:#1e4a36;
  --false-hi:#ec7888;--false-glow:rgba(236,120,136,.22);--false-dim:#4a1e26;
  --warn-hi:#f0c14a;--warn-glow:rgba(240,193,74,.20);--warn-dim:#4a3810;
  --blue:#7cc6d0;--blue-glow:rgba(124,198,208,.20);
  --pub-hi:#8cb8ff;--pub-glow:rgba(140,184,255,.20);
  --font-mono:'JetBrains Mono','Fira Code','Courier New',monospace;
  --font-ui:'Inter','Segoe UI',sans-serif;
  --r:6px;--r2:10px;--tr:160ms cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden;max-width:100vw}
body{background:var(--bg);color:var(--text);font-family:var(--font-ui);font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 12px 80px;overflow-x:hidden;max-width:100vw}

.hdr{width:100%;max-width:900px;margin-bottom:28px;display:flex;align-items:flex-end;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:14px}
.hdr-title{font-family:var(--font-mono);font-size:13px;letter-spacing:.14em;color:var(--text);text-transform:uppercase;font-weight:600}
.hdr-sub{font-size:11px;color:var(--muted);letter-spacing:.07em;font-family:var(--font-mono);margin-top:3px}
.hdr-ts{font-family:var(--font-mono);font-size:11px;color:var(--muted)}

.layout{width:100%;max-width:900px;display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:680px){.layout{grid-template-columns:1fr}}
.col-full{grid-column:1/-1}

.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:20px 18px}
.panel-title{font-family:var(--font-mono);font-size:11px;color:var(--text);letter-spacing:.12em;text-transform:uppercase;margin-bottom:16px;font-weight:600}

/* MODE BADGE */
.mode-badge{
  display:flex;align-items:center;gap:10px;padding:14px 16px;
  border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);
  transition:background var(--tr),border-color var(--tr),box-shadow var(--tr);
  margin-bottom:14px;
}
.mode-badge.m-publish{background:var(--pub-glow);border-color:var(--pub-hi);box-shadow:0 0 20px var(--pub-glow)}
.mode-badge.m-anomaly{background:var(--false-glow);border-color:var(--false-hi);box-shadow:0 0 20px var(--false-glow)}
.mode-badge.m-forced{background:var(--warn-glow);border-color:var(--warn-hi);box-shadow:0 0 20px var(--warn-glow)}
.mode-badge.m-preview{background:var(--warn-glow);border-color:var(--warn-hi)}
.mode-badge.m-blocked{background:var(--false-glow);border-color:var(--false-hi)}
.mode-icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:6px;background:var(--surface3);flex-shrink:0}
.mode-icon svg{width:16px;height:16px}
.mode-label{font-family:var(--font-mono);font-size:13px;font-weight:700;letter-spacing:.06em}
.mode-badge.m-publish .mode-label{color:var(--pub-hi)}
.mode-badge.m-anomaly .mode-label{color:var(--false-hi)}
.mode-badge.m-forced  .mode-label{color:var(--warn-hi)}
.mode-badge.m-preview .mode-label{color:var(--warn-hi)}
.mode-badge.m-blocked .mode-label{color:var(--false-hi)}
.mode-sub{font-size:11px;color:var(--text);font-family:var(--font-mono)}

/* O GATE VALUE */
.o-gate-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.eq-display{font-family:var(--font-mono);font-size:12px;color:var(--text);line-height:1.9}
.eq-b{transition:color var(--tr)}.eq-b.on{color:var(--blue)}.eq-b.off{color:var(--faint)}
.eq-m{transition:color var(--tr),text-decoration var(--tr)}
.eq-m.killed{color:var(--false-hi);text-decoration:line-through;opacity:.6}
.o-val{font-family:var(--font-mono);font-size:44px;font-weight:800;transition:color var(--tr),text-shadow var(--tr)}
.o-val.v1{color:var(--true-hi);text-shadow:0 0 30px var(--true-glow)}
.o-val.v0{color:var(--false-hi);text-shadow:0 0 30px var(--false-glow)}
.vec-map{font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:4px}

/* CHECKS */
.checks-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.check-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:background var(--tr),border-color var(--tr);
  font-family:var(--font-mono);
}
.check-btn[data-v="1"]{background:color-mix(in oklch,var(--blue) 12%,var(--surface2));border-color:var(--blue)}
.check-btn[data-v="0"]{opacity:.7}
.check-btn:active{transform:scale(.98)}
.check-indicator{width:10px;height:10px;border-radius:50%;background:var(--faint);transition:background var(--tr);flex-shrink:0}
.check-btn[data-v="1"] .check-indicator{background:var(--blue)}
.check-info{display:flex;flex-direction:column;gap:2px;min-width:0}
.check-name{font-size:12px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.check-weight{font-size:10px;color:var(--muted);letter-spacing:.06em}
.check-btn[data-v="1"] .check-name{color:var(--blue)}

/* MODIFIERS */
.mods-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.mod-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);
  padding:11px 14px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;
  font-family:var(--font-mono);font-size:12px;color:var(--text);letter-spacing:.05em;font-weight:500;
  transition:background var(--tr),border-color var(--tr);
}
.mod-btn.anom[data-v="1"]{background:var(--false-glow);border-color:var(--false-hi);color:var(--false-hi)}
.mod-btn.force[data-v="1"]{background:var(--warn-glow);border-color:var(--warn-hi);color:var(--warn-hi)}
.mod-dot{width:8px;height:8px;border-radius:50%;background:var(--faint);transition:background var(--tr)}
.mod-btn.anom[data-v="1"] .mod-dot{background:var(--false-hi)}
.mod-btn.force[data-v="1"] .mod-dot{background:var(--warn-hi)}

/* ACTION BTNS */
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.act-btn{
  font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  padding:10px 14px;border-radius:var(--r);cursor:pointer;border:1px solid var(--border2);
  background:var(--surface2);color:var(--text);
  transition:background var(--tr),border-color var(--tr),color var(--tr);
}
.act-btn:hover{color:#fff;border-color:var(--muted)}
.act-btn.recal{border-color:var(--blue);color:var(--blue)}
.act-btn.recal:hover{background:color-mix(in oklch,var(--blue) 15%,var(--surface2))}
.act-btn.forcef{border-color:var(--warn-hi);color:var(--warn-hi)}
.act-btn.forcef:hover{background:color-mix(in oklch,var(--warn-hi) 15%,var(--surface2))}
.act-btn:disabled{opacity:.3;cursor:not-allowed}

/* O-SPACE SVG */
.ospace-wrap{position:relative;aspect-ratio:1;border-radius:var(--r);overflow:hidden;background:var(--bg);border:1px solid var(--border)}
.ospace-wrap svg{width:100%;height:100%}

/* SCORE BAR */
.score-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.score-label{font-family:var(--font-mono);font-size:11px;color:var(--text)}
.score-val{font-family:var(--font-mono);font-size:14px;font-weight:700;color:var(--text)}
.score-bar{height:4px;background:var(--surface3);border-radius:99px;overflow:hidden;margin-bottom:14px}
.score-fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.16,1,.3,1),background .4s}

/* SEQUENCE TABLE */
table{width:100%;border-collapse:collapse}
th{font-family:var(--font-mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;
   text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);font-weight:600}
td{font-family:var(--font-mono);font-size:12px;padding:8px;color:var(--text);
   border-bottom:1px solid color-mix(in oklch,var(--border) 60%,transparent);
   transition:color var(--tr),background var(--tr)}
tr.sq-active td{color:var(--blue);background:color-mix(in oklch,var(--blue) 5%,transparent)}
tr.sq-pass td{color:var(--true-hi)}
tr.sq-fail td{color:var(--false-hi)}
tr.sq-warn td{color:var(--warn-hi)}

/* FORENSIC */
.findings-list{display:flex;flex-direction:column;gap:6px;min-height:44px}
.finding{
  font-family:var(--font-mono);font-size:11px;padding:8px 12px;
  border-radius:4px;border-left:2px solid var(--false-hi);
  background:color-mix(in oklch,var(--false-hi) 8%,var(--surface2));
  color:var(--false-hi);animation:fadeIn .2s ease;
}
.finding.finding-warn{border-left-color:var(--warn-hi);background:color-mix(in oklch,var(--warn-hi) 8%,var(--surface2));color:var(--warn-hi)}
.finding.finding-ok{border-left-color:var(--true-hi);background:color-mix(in oklch,var(--true-hi) 8%,var(--surface2));color:var(--true-hi)}
.no-findings{font-family:var(--font-mono);font-size:12px;color:var(--muted);text-align:center;padding:16px}

/* EXEC LOG */
.log-list{display:flex;flex-direction:column;gap:5px;max-height:180px;overflow-y:auto}
.log-item{
  display:flex;align-items:center;gap:8px;font-family:var(--font-mono);font-size:11px;
  color:var(--text);padding:6px 8px;background:var(--surface2);border-radius:4px;
  border-left:2px solid var(--border2);animation:fadeIn .15s ease;
}
.log-item.l-true{border-left-color:var(--true-hi)}
.log-item.l-false{border-left-color:var(--false-hi)}
.l-out{font-weight:700;min-width:40px}
.log-item.l-true .l-out{color:var(--true-hi)}
.log-item.l-false .l-out{color:var(--false-hi)}
.l-bits{color:var(--muted);font-size:10px}
.l-mode{color:var(--text);font-size:10px;flex:1;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.l-ts{color:var(--muted);font-size:10px;flex-shrink:0}
.log-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.clr-btn{font-size:10px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:var(--font-mono);letter-spacing:.07em;text-transform:uppercase;padding:2px 5px;border-radius:3px;transition:color var(--tr)}
.clr-btn:hover{color:var(--text)}
.empty-log{font-family:var(--font-mono);font-size:11px;color:var(--muted);text-align:center;padding:16px}

@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.aligning .mode-label{animation:pulse .8s infinite}

/* ──────────────────────────────────────────────────────────────────
   LEX FORENSICA — FUSION LAYER (additive, async-friendly)
   Tokens · axial/hex/radial geometry · reduced-motion safe
   ────────────────────────────────────────────────────────────────── */
:root{
  --lf-bg-grad: radial-gradient(ellipse at 50% -10%, rgba(79,152,163,.035) 0%, transparent 55%),
                radial-gradient(ellipse at 90% 100%, rgba(91,156,246,.025) 0%, transparent 50%),
                radial-gradient(ellipse at 0% 100%, rgba(61,171,114,.025) 0%, transparent 50%);
  --lf-hex-stroke: rgba(79,152,163,.06);
  --lf-axial-line: rgba(255,255,255,.015);
  --lf-cap-shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 12px 32px rgba(0,0,0,.6);
}
body{background-image:var(--lf-bg-grad);background-attachment:fixed}

/* Async-revealed decorative geometry — opacity flipped after init */
.lf-fx{position:fixed;inset:0;width:100vw;max-width:100vw;height:100vh;max-height:100vh;overflow:hidden;pointer-events:none;z-index:0;opacity:0;transition:opacity 600ms cubic-bezier(.16,1,.3,1);contain:layout paint size}
.lf-fx.lf-ready{opacity:1}
.lf-fx svg{width:100%;height:100%;display:block;overflow:hidden}
.lf-axial{stroke:var(--lf-axial-line);stroke-width:.5;fill:none}
.lf-hex{stroke:var(--lf-hex-stroke);stroke-width:.6;fill:none}
.lf-radial{stroke:rgba(79,152,163,.06);stroke-width:.4;fill:none}

.hdr,.layout{position:relative;z-index:1}
.panel{box-shadow:var(--lf-cap-shadow);backdrop-filter:saturate(115%);transition:border-color var(--tr),box-shadow var(--tr)}
.panel:hover{border-color:var(--border2)}
.panel-title::before{content:"◊ ";color:var(--blue);opacity:.55;margin-right:2px}

/* Polished cyber-minimal scrollbar inside log-list */
.log-list::-webkit-scrollbar{width:6px}
.log-list::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:99px}
.log-list::-webkit-scrollbar-track{background:transparent}

@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;scroll-behavior:auto !important}
  .lf-fx{transition:none}
}
</style>
</head>
<body>

<!-- LEX FORENSICA · async-loaded decorative geometry (axial + hex + radial) -->
<div class="lf-fx" id="lf-fx" aria-hidden="true"></div>

<div class="hdr">
  <div>
    <div class="hdr-title">Protocol O-Core</div>
    <div class="hdr-sub">CERT INTEGRITY · IAP Binary Gate · ProtocolSimulator_final</div>
  </div>
  <div class="hdr-ts" id="ts"></div>
</div>

<div class="layout">

  <!-- LEFT: GATE CONTROL -->
  <div class="panel">
    <div class="panel-title">O-Gate Control</div>

    <div class="mode-badge" id="mode-badge">
      <div class="mode-icon" id="mode-icon"></div>
      <div>
        <div class="mode-label" id="mode-label">—</div>
        <div class="mode-sub" id="mode-sub">—</div>
      </div>
    </div>

    <div class="o-gate-row">
      <div>
        <div class="eq-display" id="eq-display"></div>
        <div class="vec-map" id="vec-map"></div>
      </div>
      <div style="text-align:right">
        <div class="o-val" id="o-val">0</div>
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--muted)">O(s)</div>
      </div>
    </div>

    <div style="margin-bottom:10px">
      <div class="score-row">
        <span class="score-label">Regularity Score</span>
        <span class="score-val" id="score-val">0</span>
      </div>
      <div class="score-bar"><div class="score-fill" id="score-fill"></div></div>
    </div>

    <div class="checks-grid">
      <button class="check-btn" id="c1" data-v="1" onclick="toggleCheck('c1')">
        <div class="check-indicator"></div>
        <div class="check-info"><span class="check-name">Structural</span><span class="check-weight">Weight: 35</span></div>
      </button>
      <button class="check-btn" id="c2" data-v="1" onclick="toggleCheck('c2')">
        <div class="check-indicator"></div>
        <div class="check-info"><span class="check-name">Int. Sequence</span><span class="check-weight">Weight: 35</span></div>
      </button>
      <button class="check-btn" id="c3" data-v="1" onclick="toggleCheck('c3')">
        <div class="check-indicator"></div>
        <div class="check-info"><span class="check-name">Cross-Check</span><span class="check-weight">Weight: 15</span></div>
      </button>
      <button class="check-btn" id="c4" data-v="1" onclick="toggleCheck('c4')">
        <div class="check-indicator"></div>
        <div class="check-info"><span class="check-name">Regulatory</span><span class="check-weight">Weight: 15</span></div>
      </button>
    </div>

    <div class="mods-row">
      <button class="mod-btn anom" id="anom" data-v="0" onclick="toggleMod('anom')">
        <span>ANOMALY</span><div class="mod-dot"></div>
      </button>
      <button class="mod-btn force" id="force" data-v="0" onclick="toggleForce()">
        <span>FORCE·O·FALSE</span><div class="mod-dot"></div>
      </button>
    </div>

    <div class="action-row">
      <button class="act-btn recal" id="recal-btn" onclick="handleRecalibrate()">Recalibrate</button>
      <button class="act-btn" onclick="resetAll()">Reset</button>
    </div>
  </div>

  <!-- RIGHT: O-SPACE -->
  <div class="panel">
    <div class="panel-title">O-Space Projection</div>
    <div class="ospace-wrap">
      <svg id="ospace" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
  </div>

  <!-- SEQUENCE TABLE -->
  <div class="panel">
    <div class="panel-title">Sequence — INICIACE → UZAVŘENÍ</div>
    <table>
      <thead>
        <tr>
          <th>Phase</th><th>Systém</th><th>Obj O</th><th>Pravidlo R</th><th>Alignment</th>
        </tr>
      </thead>
      <tbody id="seq-body"></tbody>
    </table>
  </div>

  <!-- FORENSIC FINDINGS -->
  <div class="panel">
    <div class="panel-title">Forensic Findings</div>
    <div class="findings-list" id="findings-list"></div>
  </div>

  <!-- EXEC LOG -->
  <div class="panel col-full">
    <div class="log-hdr">
      <div class="panel-title" style="margin-bottom:0">Execution Log</div>
      <button class="clr-btn" onclick="clearLog()">CLEAR</button>
    </div>
    <div class="log-list" id="log-list">
      <div class="empty-log">— no executions yet —</div>
    </div>
  </div>

</div>

<script defer>
// ─── SEEDED RNG (matches JSX seededRandom(42)) ────────────────────────────────
function seededRandom(seed){
  let s=seed
  return()=>{ s=(s*9301+49297)%233280; return s/233280 }
}

// ─── O-SPACE HISTORY POINTS (deterministic, seed 42) ─────────────────────────
const rng=seededRandom(42)
const HIST_PTS=Array.from({length:40},(_,i)=>{
  const isOut=rng()>0.85
  const radius=isOut?35+rng()*15:rng()*12
  const angle=(i/40)*2*Math.PI
  return{x:50+radius*Math.cos(angle),y:50+radius*Math.sin(angle),opacity:isOut?0.2:0.5}
})

// ─── STATE ────────────────────────────────────────────────────────────────────
const S={c1:1,c2:1,c3:1,c4:1,anom:0,force:0,aligning:0}
const execLog=[]
let recalTimer=null

// ─── PURE BINARY GATE (no string, no truthy) ─────────────────────────────────
function computeGate(c1,c2,c3,c4,anom,force){
  const lp=c1&c2&c3&c4    // logical product — 1 only when ALL bits are 1
  const am=anom===1?0:1    // anomaly kills
  const fm=force===1?0:1   // force kills
  return lp&am&fm          // strictly 0 or 1
}

// ─── SCORE (structural, no string inference) ─────────────────────────────────
function computeScore(c1,c2,c3,c4,anom,force){
  if(anom===1||force===1)return 15
  return c1*35+c2*35+c3*15+c4*15
}

// ─── VECTOR MAP (bitfield) ────────────────────────────────────────────────────
function vectorMap(c1,c2,c3,c4){
  const v=(c1<<3)|(c2<<2)|(c3<<1)|c4
  return'0x0'+v.toString(16).toUpperCase()
}

// ─── MODE RESOLUTION (structural map only) ───────────────────────────────────
const MODES={
  FORCED_FALSE:{ cls:'m-forced',   label:'O>FALSE OVERRIDE', sub:'force·false multiplier = 0', icon:'power' },
  ANOMALY:     { cls:'m-anomaly',  label:'CRITICAL ANOMALY',  sub:'integrity multiplier collapsed', icon:'shield' },
  PUBLISH:     { cls:'m-publish',  label:'PUBLIC OUTPUT',     sub:'all gates clear → O(s) = 1', icon:'unlock' },
  PREVIEW:     { cls:'m-preview',  label:'INTERNAL PREVIEW',  sub:'partial gate — score ≥ 70', icon:'eye' },
  BLOCKED:     { cls:'m-blocked',  label:'BLOCKED',           sub:'gate output = 0', icon:'lock' },
  ALIGNING:    { cls:'m-preview',  label:'RECALIBRATING…',  sub:'alignment in progress', icon:'cpu' },
}

const MODE_ICONS={
  power:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" y1="2" x2="12" y2="12"/></svg>',
  shield:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
  unlock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>',
  eye:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>',
  lock:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>',
  cpu:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6"/><line x1="9" y1="1" x2="9" y2="4"/><line x1="15" y1="1" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="23"/><line x1="15" y1="20" x2="15" y2="23"/><line x1="20" y1="9" x2="23" y2="9"/><line x1="20" y1="14" x2="23" y2="14"/><line x1="1" y1="9" x2="4" y2="9"/><line x1="1" y1="14" x2="4" y2="14"/></svg>',
}

function resolveMode(c1,c2,c3,c4,anom,force,score,O,aligning){
  if(aligning===1)return'ALIGNING'
  if(force===1)   return'FORCED_FALSE'
  if(anom===1)    return'ANOMALY'
  if(O===1)       return'PUBLISH'
  if(c1===1&&c2===1&&score>=70)return'PREVIEW'
  return'BLOCKED'
}

// ─── FORENSIC FINDINGS (structural, no string→bool) ──────────────────────────
function computeFindings(c1,c2,c3,c4,anom,force){
  const f=[]
  if(force===1) f.push({t:'warn',msg:'OVERRIDE: [O>FALSE] O-Gate zeroed by multiplier = 0'})
  if(anom===1)  f.push({t:'err', msg:'ANOMALY: Interference detected. Integrity multiplier collapsed to 0'})
  if(c1===0)    f.push({t:'err', msg:'LOGIC_ERR (Bit 3): Structural integrity s(x) invalid'})
  if(c2===0)    f.push({t:'err', msg:'LOGIC_ERR (Bit 2): Internal sequence fails logical operation'})
  if(c3===0)    f.push({t:'err', msg:'SYS_ERR (Bit 1): External hash cross-match failed'})
  if(c4===0)    f.push({t:'err', msg:'REG_ERR (Bit 0): Regulatory norm non-conformant with space vector'})
  return f
}

// ─── SEQUENCE PHASES ─────────────────────────────────────────────────────────
const PHASES=[
  {id:'init',  label:'INICIACE',    sys:'boot',      obj:'—',    rule:'—',   align:'—'     },
  {id:'fp',    label:'FIXED-POINT', sys:'evaluate',  obj:'O(s)', rule:'R∩O', align:'check' },
  {id:'close', label:'UZAVŘENÍ',   sys:'finalize',  obj:'O',    rule:'R',   align:'commit'},
]

// ─── O-SPACE RENDER ───────────────────────────────────────────────────────────
function renderOSpace(O,score,aligning){
  const svg=document.getElementById('ospace')
  const cx=50,cy=50
  let px,py
  if(aligning===1||O===1){px=cx;py=cy}
  else{const off=(100-score)*0.4;px=cx+off;py=cy+off}

  let html=''
  // grid rings
  ;[10,20,30,40].forEach(r=>{
    html+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#252530" stroke-width="0.4"/>`
  })
  // crosshairs
  html+=`<line x1="50" y1="5" x2="50" y2="95" stroke="#252530" stroke-width="0.3"/>`
  html+=`<line x1="5" y1="50" x2="95" y2="50" stroke="#252530" stroke-width="0.3"/>`
  // history points
  HIST_PTS.forEach(p=>{
    html+=`<circle cx="${p.x}" cy="${p.y}" r="1.2" fill="#4f98a3" opacity="${p.opacity}"/>`
  })
  // current case dot
  const col=O===1?'#3dab72':(aligning===1?'#4f98a3':'#c05060')
  const glowId='glow'+Date.now()
  html+=`<defs><radialGradient id="${glowId}"><stop offset="0%" stop-color="${col}" stop-opacity="0.6"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></radialGradient></defs>`
  html+=`<circle cx="${px}" cy="${py}" r="8" fill="url(#${glowId})" opacity="0.5"/>`
  html+=`<circle cx="${px}" cy="${py}" r="3.5" fill="${col}" opacity="0.9"/>`
  html+=`<circle cx="${cx}" cy="${cy}" r="1.5" fill="#252530"/>`
  // label
  const lbl=O===1?'O=1':(aligning===1?'…':'O=0')
  html+=`<text x="${px+5}" y="${py-4}" font-size="4" fill="${col}" font-family="monospace" opacity="0.8">${lbl}</text>`
  svg.innerHTML=html
}

// ─── MAIN RENDER ─────────────────────────────────────────────────────────────
function render(){
  const{c1,c2,c3,c4,anom,force,aligning}=S
  const O    =computeGate(c1,c2,c3,c4,anom,force)
  const score=computeScore(c1,c2,c3,c4,anom,force)
  const vm   =vectorMap(c1,c2,c3,c4)
  const mkey =resolveMode(c1,c2,c3,c4,anom,force,score,O,aligning)
  const mode =mkey==='ALIGNING'?MODES.ALIGNING:MODES[mkey]
  const lp   =c1&c2&c3&c4

  // Mode badge
  const badge=document.getElementById('mode-badge')
  badge.className='mode-badge '+mode.cls+(aligning===1?' aligning':'')
  document.getElementById('mode-icon').innerHTML=MODE_ICONS[mode.icon]
  document.getElementById('mode-label').textContent=mode.label
  document.getElementById('mode-sub').textContent=mode.sub

  // O value
  const ov=document.getElementById('o-val')
  ov.textContent=aligning===1?'…':String(O)
  ov.className='o-val '+(O===1&&aligning===0?'v1':'v0')

  // Equation
  document.getElementById('eq-display').innerHTML=
    `O(s) = (<span class="eq-b ${c1===1?'on':'off'}">B1</span> &amp;
            <span class="eq-b ${c2===1?'on':'off'}">B2</span> &amp;
            <span class="eq-b ${c3===1?'on':'off'}">B3</span> &amp;
            <span class="eq-b ${c4===1?'on':'off'}">B4</span>) &amp;
      ~<span class="eq-m ${anom===1?'killed':''}">ANOM</span> &amp;
      ~<span class="eq-m ${force===1?'killed':''}">FORCE</span>`
  document.getElementById('vec-map').textContent='bitfield: '+vm+' | lp='+lp

  // Score bar
  document.getElementById('score-val').textContent=score
  const fill=document.getElementById('score-fill')
  fill.style.width=score+'%'
  fill.style.background=score>=100?'var(--true-hi)':score>=70?'var(--warn-hi)':'var(--false-hi)'

  // Check buttons
  ;['c1','c2','c3','c4'].forEach(k=>{
    const el=document.getElementById(k)
    el.dataset.v=String(S[k])
  })

  // Mod buttons
  document.getElementById('anom').dataset.v=String(anom)
  document.getElementById('force').dataset.v=String(force)

  // Recal button
  const rb=document.getElementById('recal-btn')
  rb.disabled=aligning===1

  // Sequence
  const tbody=document.getElementById('seq-body')
  tbody.innerHTML=PHASES.map(p=>{
    let cls=''
    if(p.id==='init') cls=aligning===1?'sq-active':'sq-active'
    else if(p.id==='fp'){
      if(aligning===1)      cls='sq-active'
      else if(anom===1||force===1)cls='sq-warn'
      else if(lp===1)       cls='sq-pass'
      else                  cls='sq-fail'
    }else if(p.id==='close'){
      if(aligning===1)cls='sq-active'
      else cls=O===1?'sq-pass':'sq-fail'
    }
    return`<tr class="${cls}"><td>${p.label}</td><td>${p.sys}</td><td>${p.obj}</td><td>${p.rule}</td><td>${p.align}</td></tr>`
  }).join('')

  // Findings
  const findings=computeFindings(c1,c2,c3,c4,anom,force)
  const fl=document.getElementById('findings-list')
  if(findings.length===0&&O===1){
    fl.innerHTML='<div class="finding finding-ok">ALL CLEAR — O(s) = 1 — no anomalies detected</div>'
  }else if(findings.length===0){
    fl.innerHTML='<div class="no-findings">—</div>'
  }else{
    fl.innerHTML=findings.map(f=>
      `<div class="finding${f.t==='warn'?' finding-warn':''}">  ${f.msg}</div>`
    ).join('')
  }

  // O-Space
  renderOSpace(O,score,aligning)
}

// ─── HANDLERS ─────────────────────────────────────────────────────────────────
function toggleCheck(k){
  if(S.aligning===1)return
  S[k]=S[k]===1?0:1
  render()
  logExec()
}
function toggleMod(k){
  if(S.aligning===1)return
  S[k]=S[k]===1?0:1
  render()
  logExec()
}
function toggleForce(){
  if(S.aligning===1)return
  S.force=1
  render()
  logExec()
}
function handleRecalibrate(){
  if(S.aligning===1)return
  S.aligning=1
  S.force=0
  render()
  clearTimeout(recalTimer)
  recalTimer=setTimeout(()=>{
    S.anom=0
    S.c1=1;S.c2=1;S.c3=1;S.c4=1
    S.aligning=0
    render()
    logExec()
  },2000)
}
function resetAll(){
  clearTimeout(recalTimer)
  Object.assign(S,{c1:1,c2:1,c3:1,c4:1,anom:0,force:0,aligning:0})
  render()
  logExec()
}
function clearLog(){
  execLog.length=0
  document.getElementById('log-list').innerHTML='<div class="empty-log">— no executions yet —</div>'
}

// ─── EXEC LOG ─────────────────────────────────────────────────────────────────
function logExec(){
  const{c1,c2,c3,c4,anom,force}=S
  const O=computeGate(c1,c2,c3,c4,anom,force)
  const mkey=resolveMode(c1,c2,c3,c4,anom,force,computeScore(c1,c2,c3,c4,anom,force),O,0)
  const ts=new Date().toTimeString().slice(0,8)
  execLog.unshift({O,c1,c2,c3,c4,anom,force,ts,mode:MODES[mkey]?.label||mkey})
  if(execLog.length>50)execLog.pop()
  const list=document.getElementById('log-list')
  list.innerHTML=execLog.map(e=>
    `<div class="log-item l-${e.O===1?'true':'false'}">
      <span class="l-out">O:${e.O}</span>
      <span class="l-bits">B[${e.c1}${e.c2}${e.c3}${e.c4}] A:${e.anom} F:${e.force}</span>
      <span class="l-mode">${e.mode}</span>
      <span class="l-ts">${e.ts}</span>
    </div>`
  ).join('')
}

// ─── TIMESTAMP ────────────────────────────────────────────────────────────────
function tickTs(){
  const el=document.getElementById('ts');if(!el)return
  el.textContent=new Date().toISOString().replace('T',' ').slice(0,19)+' UTC'
}

// ─── LEX FORENSICA · async geometry render (axial + hex + radial) ────────────
function lfBuildGeometry(){
  const host=document.getElementById('lf-fx');if(!host)return
  const W=1200,H=900
  let svg=`<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">`
  // axial grid (vertical + horizontal)
  for(let x=0;x<=W;x+=80) svg+=`<line class="lf-axial" x1="${x}" y1="0" x2="${x}" y2="${H}"/>`
  for(let y=0;y<=H;y+=80) svg+=`<line class="lf-axial" x1="0" y1="${y}" x2="${W}" y2="${y}"/>`
  // radial rings (centered far right-bottom and far left-top)
  ;[120,260,420,600,820].forEach(r=>{
    svg+=`<circle class="lf-radial" cx="${W*0.85}" cy="${H*0.15}" r="${r}"/>`
    svg+=`<circle class="lf-radial" cx="${W*0.12}" cy="${H*0.88}" r="${r}"/>`
  })
  // hex lattice (sparse)
  const hr=42,hs=hr*Math.sqrt(3)
  for(let row=0;row*hr*1.5<H+hr;row++){
    for(let col=0;col*hs<W+hs;col++){
      const cx=col*hs+(row%2?hs/2:0), cy=row*hr*1.5
      if(((col+row)%3)!==0) continue
      let pts=''
      for(let i=0;i<6;i++){const a=Math.PI/3*i+Math.PI/6;pts+=(cx+hr*Math.cos(a))+','+(cy+hr*Math.sin(a))+' '}
      svg+=`<polygon class="lf-hex" points="${pts.trim()}"/>`
    }
  }
  svg+='</svg>'
  host.innerHTML=svg
  requestAnimationFrame(()=>host.classList.add('lf-ready'))
}

// ─── DEFERRED INIT (DOM-safe + rAF hygiene) ──────────────────────────────────
function lfBoot(){
  // immediate functional render
  render()
  tickTs()
  setInterval(tickTs,1000)
  // lazy / idle visual layer
  const lazy=()=>requestAnimationFrame(lfBuildGeometry)
  if('requestIdleCallback' in window) requestIdleCallback(lazy,{timeout:800})
  else setTimeout(lazy,80)
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',lfBoot,{once:true})
else lfBoot()
</script>
